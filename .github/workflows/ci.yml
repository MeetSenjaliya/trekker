name: CI

on:
  push:
    branches: [main, a1]
  pull_request:

# Dummy public env so `next build` and the prod server boot without real
# secrets. The Supabase client only validates the URL shape at construction;
# no network calls are required for lint/build/unit/smoke checks.
env:
  NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key

jobs:
  test-build:
    name: Unit tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test
      - run: npm run build
      - name: Upload standalone build for e2e
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: |
            .next
          retention-days: 1

  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    needs: test-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next
      - run: npm run test:e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
